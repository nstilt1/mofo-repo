name: Mofo Mojo Release Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
    paths:
      - 'mofoMojoVst/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm manual release'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  SLUG: the-mofos-mojo
  RELEASE_API: ${{ secrets.RELEASE_API_URL }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_REGION: us-east-1

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Build Rust static library for macOS — two thin per-arch .a files.
# We do NOT lipo-combine into a universal fat .a here.  Passing a fat .a to
# a single-arch ld (even via lipo -thin afterwards) causes ld on macOS 14 to
# hang or silently drop all objects.  Instead we upload the two thin archives
# produced directly by cargo and feed each one to the matching arch build.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-rust-macos:
    runs-on: [self-hosted, macos, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Diagnostics — environment
        run: |
          set -euxo pipefail
          echo "PWD: $(pwd)"
          echo "whoami: $(whoami)"
          which git cargo rustup || true
          rustup show || true
          rustup target list --installed || true

      - name: Clone software-licensor-client-side-library
        run: |
          set -euxo pipefail
          # Self-hosted runner workspace persists between runs — remove any
          # stale clone from a previous run before cloning fresh.
          rm -rf software-licensor-client-side-library
          git clone https://github.com/nstilt1/software-licensor-client-side-library \
            software-licensor-client-side-library

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build (macOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            # Cargo writes artifacts to the WORKSPACE-ROOT target/, not the
            # member crate's dir — this is a virtual workspace (see root
            # Cargo.toml: [workspace] members = ["software_licensor_static_rust_lib"]).
            software-licensor-client-side-library/target
          # Lockfile lives at the workspace root, not in the member crate.
          key: rust-macos-${{ hashFiles('software-licensor-client-side-library/Cargo.lock') }}
          restore-keys: rust-macos-

      - name: Build Rust static libraries — arm64 and x86_64 (macOS)
        working-directory: software-licensor-client-side-library/software_licensor_static_rust_lib
        run: |
          set -euxo pipefail

          # arm64: minimum deployment target 11.0 (Apple Silicon minimum)
          MACOSX_DEPLOYMENT_TARGET=11.0 \
            cargo build --release --features logging --target aarch64-apple-darwin

          # x86_64: minimum deployment target 10.13
          MACOSX_DEPLOYMENT_TARGET=10.13 \
            cargo build --release --features logging --target x86_64-apple-darwin

          # NOTE: this crate is a member of a virtual Cargo workspace, so cargo
          # writes ALL artifacts to the workspace-root target/ (one level up),
          # NOT to this member crate's own target/.  Hence ../target below.
          echo "Contents of ../target/aarch64-apple-darwin/release/:"
          ls -la ../target/aarch64-apple-darwin/release/ || true
          echo "Contents of ../target/x86_64-apple-darwin/release/:"
          ls -la ../target/x86_64-apple-darwin/release/ || true

          ARM64_LIB=$(find ../target/aarch64-apple-darwin/release -maxdepth 1 -name '*.a' | head -n 1)
          X86_64_LIB=$(find ../target/x86_64-apple-darwin/release -maxdepth 1 -name '*.a' | head -n 1)

          if [ -z "$ARM64_LIB" ]; then
            echo "ERROR: no .a file found in ../target/aarch64-apple-darwin/release/"
            exit 1
          fi
          if [ -z "$X86_64_LIB" ]; then
            echo "ERROR: no .a file found in ../target/x86_64-apple-darwin/release/"
            exit 1
          fi

          echo "arm64 library found: $ARM64_LIB"
          file "$ARM64_LIB"
          echo "x86_64 library found: $X86_64_LIB"
          file "$X86_64_LIB"

          # Normalise to a known filename for the upload/download steps and
          # for CMakeLists.txt's RUST_LIBRARY_PATH expectation.  cargo already
          # names the staticlib libsoftwarelicensor.a (the crate's [lib] name
          # IS softwarelicensor), so the discovered file usually IS the target
          # — skip the copy in that case to avoid "are identical" errors.
          ARM64_DEST=../target/aarch64-apple-darwin/release/libsoftwarelicensor.a
          X86_64_DEST=../target/x86_64-apple-darwin/release/libsoftwarelicensor.a
          [ "$ARM64_LIB"  -ef "$ARM64_DEST"  ] || cp "$ARM64_LIB"  "$ARM64_DEST"
          [ "$X86_64_LIB" -ef "$X86_64_DEST" ] || cp "$X86_64_LIB" "$X86_64_DEST"

      - name: Upload Rust arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-macos-arm64
          path: software-licensor-client-side-library/target/aarch64-apple-darwin/release/libsoftwarelicensor.a
          retention-days: 7

      - name: Upload Rust x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-macos-x86_64
          path: software-licensor-client-side-library/target/x86_64-apple-darwin/release/libsoftwarelicensor.a
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Build Rust static library for Windows
# ─────────────────────────────────────────────────────────────────────────────
  build-rust-windows:
    runs-on: [self-hosted, windows, x64]

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clone software-licensor-client-side-library
        shell: powershell
        run: |
          # Self-hosted runner workspace persists between runs — remove any
          # stale clone from a previous run before cloning fresh.
          if (Test-Path software-licensor-client-side-library) {
            Remove-Item -Recurse -Force software-licensor-client-side-library
          }
          git clone https://github.com/nstilt1/software-licensor-client-side-library software-licensor-client-side-library

      # dtolnay/rust-toolchain is NOT used here: its composite action
      # internally hardcodes `shell: C:\Windows\system32\bash.EXE` for a
      # "parse toolchain version" step, which hits the same MSYS2 path-
      # mangling bug ("I:actions-runner_work_temp...sh: No such file or
      # directory") that affects all Git-Bash `run:` steps on self-hosted
      # Windows runners — and we can't add `shell:` overrides inside someone
      # else's composite action. Install/ensure the toolchain via rustup
      # directly in PowerShell instead.
      - name: Install Rust stable (Windows MSVC)
        shell: powershell
        run: |
          rustup toolchain install stable-x86_64-pc-windows-msvc --no-self-update
          rustup default stable-x86_64-pc-windows-msvc
          rustup target add x86_64-pc-windows-msvc
          rustc --version
          cargo --version

      - name: Cache Rust build (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            # Virtual workspace: artifacts land in the workspace-root target\,
            # not in the member crate's dir.
            software-licensor-client-side-library\target
          # Lockfile is at the workspace root, not in the member crate.
          key: rust-windows-${{ hashFiles('software-licensor-client-side-library/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Build Rust static library (Windows)
        working-directory: software-licensor-client-side-library\software_licensor_static_rust_lib
        shell: powershell
        run: |
          cargo build --release --features logging --target x86_64-pc-windows-msvc

          # NOTE: virtual Cargo workspace — cargo writes artifacts to the
          # workspace-root target\ (one level up), NOT this member crate's
          # own target\.  Hence ..\target below.
          Write-Host "Contents of ..\target\x86_64-pc-windows-msvc\release\:"
          Get-ChildItem ..\target\x86_64-pc-windows-msvc\release\ | Format-Table Name, Length

          $lib = Get-ChildItem ..\target\x86_64-pc-windows-msvc\release\*.lib | Select-Object -First 1
          if (-not $lib) {
            Write-Error "No .lib file found in ..\target\x86_64-pc-windows-msvc\release\"
            exit 1
          }
          Write-Host "Found library: $($lib.FullName)"

          # Normalise to a known filename for the upload/download steps and
          # for CMakeLists.txt's RUST_LIBRARY_PATH expectation.  cargo already
          # names the staticlib softwarelicensor.lib (the crate's [lib] name IS
          # softwarelicensor), so the discovered file usually IS the target —
          # skip the copy in that case to avoid "overwrite ... with itself".
          $dest = Join-Path $lib.DirectoryName "softwarelicensor.lib"
          if ($lib.FullName -ne $dest) {
            Copy-Item $lib.FullName $dest -Force
          }
          Get-Item $dest

      - name: Upload Rust Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-windows
          path: software-licensor-client-side-library\target\x86_64-pc-windows-msvc\release\softwarelicensor.lib
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Build, sign, and package for Windows
# Uses Ninja + ilammy/msvc-dev-cmd (VS generator fails on GH runners because
# setup-msbuild only adds MSBuild to PATH but does not register a VS instance,
# so CMake's VS instance discovery via vswhere returns nothing).
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    needs: build-rust-windows
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 45   # /O1 on MSVC compiles VST3 SDK TUs in ~5 min each vs 60+ with /O2

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Extract version from .jucer file
        shell: powershell
        run: |
          $path = "mofoMojoVst/Mofo Filter.jucer"
          $content = Get-Content $path -Raw

          # Match ONLY the version attribute inside the JUCERPROJECT tag
          if ($content -match '<JUCERPROJECT[^>]*version="([^"]+)"') {
              $version = $matches[1]
              Write-Host "Detected version: $version"
              Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version"
          } else {
              Write-Error "Version attribute not found in JUCERPROJECT tag"
              exit 1
          }

      - name: Download Rust Windows library
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-windows
          path: rust-lib-windows/

      # Sets up the MSVC compiler environment (cl.exe, link.exe, include/lib
      # paths) via vcvarsall.bat — required for Ninja + MSVC on GH runners.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # We invoke signtool directly with the Trusted Signing /dlib plugin
      # (see the sign steps below).  signtool ships with the "Windows SDK
      # Signing Tools for Desktop Apps" component (already on this runner) but
      # is not on the global PATH — that's why `signtool` alone fails in a
      # plain cmd prompt.  Resolve its full path here and export SIGNTOOL_PATH.
      - name: Locate signtool
        shell: powershell
        run: |
          $kitsBin = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtool = Get-ChildItem $kitsBin -Directory -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.FullName "x64\signtool.exe") } |
            Sort-Object { try { [version]$_.Name } catch { [version]"0.0" } } -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            Write-Error ("signtool.exe not found under $kitsBin\*\x64\. " +
              "Install the 'Windows SDK Signing Tools for Desktop Apps' component " +
              "(Visual Studio Installer > Individual components, or the standalone " +
              "Windows 10/11 SDK installer).")
            exit 1
          }
          $signtoolPath = Join-Path $signtool.FullName "x64\signtool.exe"
          Write-Host "Using signtool: $signtoolPath"
          "SIGNTOOL_PATH=$signtoolPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Configure CMake (Windows — Ninja + MSVC)
        shell: powershell
        run: |
          $rustLib = (Resolve-Path "rust-lib-windows\softwarelicensor.lib").Path
          cmake -S mofoMojoVst -B build-windows `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DRUST_LIBRARY_PATH="$rustLib"

      - name: Build VST3 (Windows)
        shell: powershell
        run: |
          cmake --build build-windows --target HyperformanceSolutionsCMake_VST3
          $vst3 = Get-ChildItem -Recurse build-windows -Directory -Filter "*.vst3" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vst3) {
            $vst3 = Get-ChildItem -Recurse build-windows -Filter "*.vst3" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $vst3) { Write-Error "VST3 not found after build"; exit 1 }
          echo "VST3_PATH=$($vst3.FullName)" >> $env:GITHUB_ENV
          Write-Host "Built VST3 at: $($vst3.FullName)"

      - name: Download Trusted Signing dlib
        shell: powershell
        run: |
          # signtool's /dlib plugin authenticates via Azure.Identity directly
          # from AZURE_TENANT_ID/AZURE_CLIENT_ID/AZURE_CLIENT_SECRET — no
          # `az login`, so NO Azure subscription is required (only the
          # data-plane "Trusted Signing Certificate Profile Signer" role on the
          # signing account).  This replaces trusted-signing-cli, which forced
          # an `az login` that fails when the SP can't enumerate a subscription.
          $dir = Join-Path $env:RUNNER_TEMP "tsdlib"
          if (Test-Path $dir) { Remove-Item -Recurse -Force $dir }
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $zip = Join-Path $dir "client.zip"
          $url = "https://www.nuget.org/api/v2/package/Microsoft.ArtifactSigning.Client/1.0.128"
          Write-Host "Downloading Trusted Signing client from $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dir -Force
          $dlib = Get-ChildItem -Recurse -Path $dir -Filter "Azure.CodeSigning.Dlib.dll" |
            Select-Object -First 1
          if (-not $dlib) { Write-Error "Azure.CodeSigning.Dlib.dll not found in package"; exit 1 }
          Write-Host "Dlib: $($dlib.FullName)"
          "TS_DLIB_PATH=$($dlib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Diagnose Azure credentials (informational — does not sign)
        shell: powershell
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
        run: |
          # Prints only the LENGTH of each secret (never the value) so you can
          # spot an unset/empty or malformed secret without leaking it.
          function Report($name, $val, $expected) {
            $len = 0; if ($val) { $len = "$val".Length }
            $note = ""
            if ($len -eq 0) { $note = "  <-- EMPTY: secret is not set in the repo!" }
            elseif ($expected -and $len -ne $expected) { $note = "  <-- unexpected length (a GUID is $expected chars)" }
            Write-Host ("{0,-24} length={1}{2}" -f $name, $len, $note)
          }
          Report "AZURE_TENANT_ID"        $env:AZURE_TENANT_ID        36
          Report "AZURE_CLIENT_ID"        $env:AZURE_CLIENT_ID        36
          Report "AZURE_CLIENT_SECRET"    $env:AZURE_CLIENT_SECRET     0
          Report "AZURE_SIGNING_ENDPOINT" $env:AZURE_SIGNING_ENDPOINT  0
          Report "AZURE_SIGNING_ACCOUNT"  $env:AZURE_SIGNING_ACCOUNT   0
          Report "AZURE_SIGNING_PROFILE"  $env:AZURE_SIGNING_PROFILE   0

          Write-Host "`nTesting service-principal auth (with --allow-no-subscriptions)..."
          $out = & az login --service-principal -t $env:AZURE_TENANT_ID -u $env:AZURE_CLIENT_ID -p $env:AZURE_CLIENT_SECRET --allow-no-subscriptions 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "==> AUTH OK: tenant + client-id + secret are ALL valid."
            Write-Host "    Signing below uses the dlib's env-var auth (no subscription needed),"
            Write-Host "    so if it still fails, check the SP has the 'Trusted Signing"
            Write-Host "    Certificate Profile Signer' role on the signing account."
          } else {
            Write-Host "==> AUTH FAILED. Azure CLI output (look for the AADSTS code):"
            Write-Host ($out | Out-String)
            Write-Host "    AADSTS90002   -> AZURE_TENANT_ID is wrong"
            Write-Host "    AADSTS700016  -> AZURE_CLIENT_ID is not in this tenant"
            Write-Host "    AADSTS7000215 -> AZURE_CLIENT_SECRET is wrong"
            Write-Host "    AADSTS7000222 -> AZURE_CLIENT_SECRET has expired"
          }
          exit 0   # informational only — never fail the job here

      - name: Sign VST3 (Windows — Azure Trusted Signing)
        shell: powershell
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
        run: |
          $dll = Get-ChildItem -Recurse "$env:VST3_PATH" -Filter "*.vst3" -File | Select-Object -First 1
          if (-not $dll) { $dll = Get-Item "$env:VST3_PATH" -ErrorAction SilentlyContinue }
          if (-not $dll) { Write-Error "Could not locate .vst3 DLL to sign"; exit 1 }
          Write-Host "Signing: $($dll.FullName)"

          $meta = Join-Path $env:RUNNER_TEMP "ts-metadata.json"
          $json = @{
            Endpoint               = $env:AZURE_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_SIGNING_ACCOUNT
            CertificateProfileName = $env:AZURE_SIGNING_PROFILE
          } | ConvertTo-Json
          # Write UTF-8 WITHOUT a BOM. Set-Content -Encoding utf8 on Windows
          # PowerShell 5.1 prepends a BOM (EF BB BF), and the dlib's
          # System.Text.Json parser rejects it ("'0xEF' is an invalid start").
          [System.IO.File]::WriteAllText($meta, $json, (New-Object System.Text.UTF8Encoding($false)))

          & "$env:SIGNTOOL_PATH" sign /v /fd SHA256 `
            /tr http://timestamp.acs.microsoft.com/ /td SHA256 `
            /dlib "$env:TS_DLIB_PATH" /dmdf "$meta" `
            "$($dll.FullName)"
          if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed to sign the VST3"; exit 1 }

      - name: Ensure NSIS (use installed, else portable download)
        shell: powershell
        run: |
          # Prefer an NSIS already installed on this (persistent) runner — most
          # reliable.  Install once with `winget install NSIS.NSIS` (as admin)
          # or the NSIS installer, and this step will just find it.  Falls back
          # to a validated portable download only if none is present.
          function Find-MakeNSIS {
            $cmd = Get-Command makensis.exe -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Source }
            foreach ($p in @("C:\Program Files (x86)\NSIS\makensis.exe",
                             "C:\Program Files\NSIS\makensis.exe")) {
              if (Test-Path $p) { return $p }
            }
            return $null
          }

          $makensis = Find-MakeNSIS
          if (-not $makensis) {
            $ver = "3.11"
            $dir = Join-Path $env:RUNNER_TEMP "nsis"
            if (Test-Path $dir) { Remove-Item -Recurse -Force $dir }
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
            $zip = Join-Path $dir "nsis.zip"
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            # SourceForge's redirector often serves an HTML interstitial instead
            # of the file, so try several mirrors and verify the 'PK' zip magic
            # before trusting the download.
            $urls = @(
              "https://master.dl.sourceforge.net/project/nsis/NSIS%203/$ver/nsis-$ver.zip?viasf=1",
              "https://downloads.sourceforge.net/project/nsis/NSIS%203/$ver/nsis-$ver.zip",
              "https://phoenixnap.dl.sourceforge.net/project/nsis/NSIS%203/$ver/nsis-$ver.zip?viasf=1"
            )
            $ok = $false
            foreach ($u in $urls) {
              try {
                Write-Host "Downloading NSIS from $u"
                Invoke-WebRequest -Uri $u -OutFile $zip -UseBasicParsing -MaximumRedirection 10
                $fs = [System.IO.File]::OpenRead($zip)
                $b = New-Object byte[] 2; [void]$fs.Read($b, 0, 2); $fs.Close()
                if ($b[0] -eq 0x50 -and $b[1] -eq 0x4B) { $ok = $true; break }
                Write-Host ("  -> not a zip (first bytes 0x{0:X2}{1:X2}); trying next mirror" -f $b[0], $b[1])
              } catch {
                Write-Host "  -> download failed: $($_.Exception.Message)"
              }
            }
            if (-not $ok) {
              Write-Error ("Could not fetch a valid NSIS zip from any mirror. " +
                "Install NSIS on the runner once (e.g. 'winget install NSIS.NSIS' " +
                "in an elevated shell) and re-run.")
              exit 1
            }
            Expand-Archive -Path $zip -DestinationPath $dir -Force
            $mk = Get-ChildItem -Recurse -Path $dir -Filter "makensis.exe" | Select-Object -First 1
            if (-not $mk) { Write-Error "makensis.exe not found after extracting NSIS"; exit 1 }
            $makensis = $mk.FullName
          }

          Write-Host "Using makensis: $makensis"
          # makensis finds its Stubs/Plugins/Include relative to its own exe.
          Split-Path $makensis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create NSIS installer script
        shell: powershell
        run: |
          $version = $env:VERSION
          $vst3Path = $env:VST3_PATH
          $nsiContent = @"
          !define PRODUCT_NAME "The Mofo's Mojo v1"
          !define PRODUCT_VERSION "$version"
          !define VST3_INSTALL_DIR "`$PROGRAMFILES64\Common Files\VST3\Altered Brain Chemistry\The Mofo's Mojo v1.vst3"

          Name "`${PRODUCT_NAME} `${PRODUCT_VERSION}"
          OutFile "MofoMojo-$version-windows-installer.exe"
          InstallDir "`${VST3_INSTALL_DIR}"
          RequestExecutionLevel admin
          Unicode True

          Section "VST3 Plugin"
            SetOutPath "`${VST3_INSTALL_DIR}"
            File /r "$vst3Path\*.*"
          SectionEnd
          "@
          $nsiContent | Out-File -FilePath installer.nsi -Encoding UTF8

      - name: Build NSIS installer
        shell: powershell
        run: |
          makensis installer.nsi
          if ($LASTEXITCODE -ne 0) { Write-Error "makensis failed to build the installer"; exit 1 }
          $installer = Get-Item "MofoMojo-$env:VERSION-windows-installer.exe"
          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_ENV

      - name: Sign installer (Windows — Azure Trusted Signing)
        shell: powershell
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
        run: |
          $meta = Join-Path $env:RUNNER_TEMP "ts-metadata.json"
          $json = @{
            Endpoint               = $env:AZURE_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_SIGNING_ACCOUNT
            CertificateProfileName = $env:AZURE_SIGNING_PROFILE
          } | ConvertTo-Json
          # UTF-8 without BOM (see VST3 sign step for why).
          [System.IO.File]::WriteAllText($meta, $json, (New-Object System.Text.UTF8Encoding($false)))

          & "$env:SIGNTOOL_PATH" sign /v /fd SHA256 `
            /tr http://timestamp.acs.microsoft.com/ /td SHA256 `
            /dlib "$env:TS_DLIB_PATH" /dmdf "$meta" `
            "$env:INSTALLER_PATH"
          if ($LASTEXITCODE -ne 0) { Write-Error "signtool failed to sign the installer"; exit 1 }

      - name: Compute SHA-256
        shell: powershell
        run: |
          $hash = (Get-FileHash "$env:INSTALLER_PATH" -Algorithm SHA256).Hash.ToLower()
          echo "FILE_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Upload signed installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ env.INSTALLER_PATH }}
          retention-days: 7

      - name: Save build metadata
        shell: powershell
        run: |
          @"
          INSTALLER_NAME=$env:INSTALLER_NAME
          FILE_SHA256=$env:FILE_SHA256
          VERSION=$env:VERSION
          SLUG=$env:SLUG
          "@ | Out-File -FilePath windows-meta.env -Encoding ascii

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: windows-meta
          path: windows-meta.env
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Upload Windows installer to S3 via release API
# ─────────────────────────────────────────────────────────────────────────────
  upload-windows:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: mofo-release-windows-${{ github.run_id }}

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: installer/

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: windows-meta
          path: .

      - name: Load build metadata
        # windows-meta.env is written by PowerShell with CRLF line endings;
        # strip the trailing \r (and any leading indentation) before feeding
        # GITHUB_ENV, otherwise SLUG/VERSION carry a \r into the S3 key and the
        # release API can't match the slug.
        run: tr -d '\r' < windows-meta.env | sed 's/^ *//' >> "$GITHUB_ENV"

      - name: Resolve installer path
        run: |
          FILE=$(find installer/ -maxdepth 1 -type f | head -n 1)
          echo "FILE_PATH=$FILE" >> "$GITHUB_ENV"

      - name: Install botocore
        run: pip3 install botocore --break-system-packages --quiet

      - name: Upload installer to S3 and notify release API
        env:
          PLATFORM: windows
          CONTENT_TYPE: application/octet-stream
        run: |
          if [ -z "$RELEASE_API" ]; then
            echo "Missing RELEASE_API_URL secret." >&2
            exit 1
          fi
          python3 << 'PYEOF'
          import json, mimetypes, os, urllib.error, urllib.request
          from urllib.parse import urlsplit
          import botocore.auth, botocore.awsrequest, botocore.credentials, botocore.session

          api_base     = os.environ["RELEASE_API"].rstrip("/")
          slug         = os.environ["SLUG"]
          version      = os.environ["VERSION"]
          platform     = os.environ["PLATFORM"]
          filename     = os.environ["INSTALLER_NAME"]
          filepath     = os.environ["FILE_PATH"]
          content_type = os.environ.get("CONTENT_TYPE") or "application/octet-stream"
          sha256       = os.environ["FILE_SHA256"]
          aws_region   = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION") or "us-east-1"

          session      = botocore.session.get_session()
          creds        = session.get_credentials()
          if creds is None: raise RuntimeError("No AWS credentials available.")
          frozen_creds = creds.get_frozen_credentials()

          def signed_post_json(path, payload):
              url  = f"{api_base}/{path.lstrip('/')}"
              body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
              headers = {"Content-Type": "application/json", "Accept": "application/json", "Host": urlsplit(url).netloc}
              aws_req = botocore.awsrequest.AWSRequest(method="POST", url=url, data=body, headers=headers)
              botocore.auth.SigV4Auth(frozen_creds, "execute-api", aws_region).add_auth(aws_req)
              req = urllib.request.Request(url, data=body, method="POST", headers=dict(aws_req.headers.items()))
              try:
                  with urllib.request.urlopen(req, timeout=120) as r:
                      return json.loads(r.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  raise RuntimeError(f"{path} HTTP {exc.code}: {exc.read().decode('utf-8', errors='replace')[:2000]}") from exc

          def put_file(upload_url):
              size = os.path.getsize(filepath)
              with open(filepath, "rb") as f:
                  req = urllib.request.Request(upload_url, data=f, method="PUT",
                      headers={"Content-Type": content_type, "Content-Length": str(size)})
                  try:
                      with urllib.request.urlopen(req, timeout=1800) as r: r.read()
                  except urllib.error.HTTPError as exc:
                      raise RuntimeError(f"S3 PUT HTTP {exc.code}: {exc.read().decode('utf-8', errors='replace')[:2000]}") from exc
              return size

          presign = signed_post_json("api/release-upload/presign", {
              "slug": slug, "version": version, "platform": platform,
              "filename": filename, "contentType": content_type,
          })
          print("Presign:", json.dumps({"key": presign.get("key"), "publicUrl": presign.get("publicUrl")}, indent=2))
          missing = [k for k in ("uploadUrl", "key", "publicUrl") if k not in presign]
          if missing: raise RuntimeError(f"Presign missing: {missing}")
          size = put_file(presign["uploadUrl"])
          print(f"S3 upload complete: {size} bytes")
          confirm = signed_post_json("api/release-upload/confirm", {
              "slug": slug, "version": version, "platform": platform,
              "new_key": presign["key"], "new_url": presign["publicUrl"], "sha256": sha256,
          })
          print("Confirm:", json.dumps(confirm, indent=2))
          PYEOF

# ─────────────────────────────────────────────────────────────────────────────
# Job 5: Build, sign, and package for macOS (universal x86_64 + arm64)
# Split-arch strategy: arm64 and x86_64 built separately with per-arch thin
# Rust .a files (uploaded as separate artifacts by build-rust-macos), then
# lipo-combined.  Ninja generator for predictable parallel compilation.
#
# SELF-HOSTED RUNNER RECOMMENDED: set runs-on to [self-hosted, macos, arm64]
# after registering your M1 Mac as a runner (Settings > Actions > Runners).
# Self-hosting gives you: stable Xcode version, no pool wait, fast native
# arm64 compile, and x86_64 via Rosetta 2 cross-compilation.
# ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    needs: build-rust-macos
    runs-on: [self-hosted, macos, arm64]   # or: [self-hosted, macos, arm64]
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from .jucer file
        run: |
          # macOS runner has no pwsh; use bash + perl (preinstalled on macOS).
          # perl -0777 slurps the whole file so [^>]* can span newlines inside
          # the opening tag, matching ONLY the JUCERPROJECT version attribute
          # (not an earlier version= attribute elsewhere in the XML).
          VERSION=$(perl -0777 -ne 'print "$1\n" if /<JUCERPROJECT[^>]*version="([^"]+)"/' "mofoMojoVst/Mofo Filter.jucer" | head -n1)
          if [ -z "$VERSION" ]; then
            echo "Version attribute not found in JUCERPROJECT tag" >&2
            exit 1
          fi
          echo "Detected version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download Rust arm64 library
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-macos-arm64
          path: rust-lib-arm64/

      - name: Download Rust x86_64 library
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-macos-x86_64
          path: rust-lib-x86_64/

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest

      # -- Build arm64 slice ----------------------------------------------------
      - name: Configure CMake - arm64
        run: |
          cmake -S mofoMojoVst -B build-arm64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DRUST_LIBRARY_PATH="$(pwd)/rust-lib-arm64/libsoftwarelicensor.a"

      - name: Build VST3 + AU - arm64
        run: |
          cmake --build build-arm64 \
            --target HyperformanceSolutionsCMake_VST3 HyperformanceSolutionsCMake_AU

      # -- Build x86_64 slice ---------------------------------------------------
      - name: Configure CMake - x86_64
        run: |
          cmake -S mofoMojoVst -B build-x86_64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13" \
            -DRUST_LIBRARY_PATH="$(pwd)/rust-lib-x86_64/libsoftwarelicensor.a"

      - name: Build VST3 + AU - x86_64
        run: |
          cmake --build build-x86_64 \
            --target HyperformanceSolutionsCMake_VST3 HyperformanceSolutionsCMake_AU

      # -- Lipo-combine into universal bundles ----------------------------------
      - name: Lipo-combine slices into universal bundles
        run: |
          set -euo pipefail

          VST3_ARM=$(find build-arm64  -name "*.vst3"      -type d | head -n 1)
          VST3_X86=$(find build-x86_64 -name "*.vst3"      -type d | head -n 1)
          AU_ARM=$(  find build-arm64  -name "*.component"  -type d | head -n 1)
          AU_X86=$(  find build-x86_64 -name "*.component"  -type d | head -n 1)

          [ -z "$VST3_ARM" ] && { echo "arm64 VST3 not found";   exit 1; }
          [ -z "$VST3_X86" ] && { echo "x86_64 VST3 not found";  exit 1; }
          [ -z "$AU_ARM"   ] && { echo "arm64 AU not found";      exit 1; }
          [ -z "$AU_X86"   ] && { echo "x86_64 AU not found";     exit 1; }

          lipo_bundle() {
            local arm_bundle="$1" x86_bundle="$2" out_bundle="$3"
            cp -r "$arm_bundle" "$out_bundle"
            local bin_name
            bin_name=$(basename "$(find "$arm_bundle/Contents/MacOS" -type f | head -n 1)")
            lipo -create \
              "$arm_bundle/Contents/MacOS/$bin_name" \
              "$x86_bundle/Contents/MacOS/$bin_name" \
              -output "$out_bundle/Contents/MacOS/$bin_name"
            echo "lipo OK: $out_bundle ($(lipo -archs "$out_bundle/Contents/MacOS/$bin_name"))"
          }

          mkdir -p universal-bundles
          PLUGIN_NAME="The Mofo's Mojo v1"
          lipo_bundle "$VST3_ARM" "$VST3_X86" "universal-bundles/${PLUGIN_NAME}.vst3"
          lipo_bundle "$AU_ARM"   "$AU_X86"   "universal-bundles/${PLUGIN_NAME}.component"

          echo "VST3_PATH=$(pwd)/universal-bundles/${PLUGIN_NAME}.vst3" >> "$GITHUB_ENV"
          echo "AU_PATH=$(pwd)/universal-bundles/${PLUGIN_NAME}.component" >> "$GITHUB_ENV"

      - name: Import signing certificates
        env:
          APPLE_APPLICATION_CERTIFICATE: ${{ secrets.APPLE_APPLICATION_CERTIFICATE }}
          APPLE_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_APPLICATION_CERTIFICATE" | base64 --decode > /tmp/app-cert.p12
          security import /tmp/app-cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$APPLE_APPLICATION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > /tmp/installer-cert.p12
          security import /tmp/installer-cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild

          # Pull Apple's intermediate + root into the build keychain so codesign
          # can build the full chain (leaf -> "Developer ID Certification
          # Authority" -> "Apple Root CA").  These are NOT inside the .p12.
          # Non-fatal: the search-list change below also exposes them via the
          # System/login keychains.
          curl -fsSL -o /tmp/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            && security import /tmp/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" 2>/dev/null \
            || echo "WARN: could not import Developer ID G2 intermediate (continuing)"
          curl -fsSL -o /tmp/AppleRootCA.cer https://www.apple.com/appleca/AppleIncRootCertificate.cer \
            && security import /tmp/AppleRootCA.cer -k "$KEYCHAIN_PATH" 2>/dev/null \
            || echo "WARN: could not import Apple Root CA (continuing)"

          # CRITICAL: add the build keychain to the search list WITHOUT dropping
          # the System/login keychains.  Replacing the list with only the build
          # keychain hid Apple's CA certs, causing "unable to build chain to
          # self-signed root" and errSecInternalComponent.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            "$HOME/Library/Keychains/login.keychain-db" \
            "/Library/Keychains/System.keychain"

          # Let apple tools use the private keys without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          rm -f /tmp/app-cert.p12 /tmp/installer-cert.p12 \
                /tmp/DeveloperIDG2CA.cer /tmp/AppleRootCA.cer

      - name: Sign VST3 bundle (macOS)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # No --entitlements: App-Sandbox entitlements are inert for a plugin
          # loaded into a (non-sandboxed) DAW, and the hardened runtime does not
          # restrict network or file access.  --timestamp is required for
          # notarization.
          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            "$VST3_PATH"
          codesign --verify --deep --strict "$VST3_PATH"
          echo "VST3 signed OK"

      - name: Sign AU bundle (macOS)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            "$AU_PATH"
          codesign --verify --deep --strict "$AU_PATH"
          echo "AU signed OK"

      - name: Stage plugin bundles for packaging
        run: |
          mkdir -p pkg-stage/vst3 pkg-stage/au
          cp -r "$VST3_PATH" pkg-stage/vst3/
          cp -r "$AU_PATH"   pkg-stage/au/

      - name: Build flat macOS installer (.pkg)
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          PKG_NAME="MofoMojo-${VERSION}-macos.pkg"

          pkgbuild \
            --root pkg-stage/vst3 \
            --install-location "/Library/Audio/Plug-Ins/VST3" \
            --identifier "com.alteredbrainchemistry.mofomojo.vst3" \
            --version "$VERSION" \
            vst3-component.pkg

          pkgbuild \
            --root pkg-stage/au \
            --install-location "/Library/Audio/Plug-Ins/Components" \
            --identifier "com.alteredbrainchemistry.mofomojo.au" \
            --version "$VERSION" \
            au-component.pkg

          cat > distribution.xml << DISTXML
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>The Mofo's Mojo v1 ${VERSION}</title>
              <options customize="never" require-scripts="false" hostArchitectures="x86_64,arm64"/>
              <choices-outline>
                  <line choice="vst3"/>
                  <line choice="au"/>
              </choices-outline>
              <choice id="vst3" title="VST3 Plugin">
                  <pkg-ref id="com.alteredbrainchemistry.mofomojo.vst3"/>
              </choice>
              <choice id="au" title="AU Plugin">
                  <pkg-ref id="com.alteredbrainchemistry.mofomojo.au"/>
              </choice>
              <pkg-ref id="com.alteredbrainchemistry.mofomojo.vst3">vst3-component.pkg</pkg-ref>
              <pkg-ref id="com.alteredbrainchemistry.mofomojo.au">au-component.pkg</pkg-ref>
          </installer-gui-script>
          DISTXML

          productbuild \
            --distribution distribution.xml \
            --package-path . \
            --sign "$APPLE_INSTALLER_IDENTITY" \
            "$PKG_NAME"

          echo "PKG_PATH=$(pwd)/$PKG_NAME" >> "$GITHUB_ENV"
          echo "PKG_NAME=$PKG_NAME"        >> "$GITHUB_ENV"

      - name: Notarize macOS installer
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$PKG_PATH"
          echo "Notarization complete"

      - name: Compute SHA-256
        run: |
          echo "FILE_SHA256=$(shasum -a 256 "$PKG_PATH" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Upload signed pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ env.PKG_PATH }}
          retention-days: 7

      - name: Save build metadata
        run: |
          cat > macos-meta.env << EOF
          PKG_NAME=$PKG_NAME
          FILE_SHA256=$FILE_SHA256
          VERSION=$VERSION
          SLUG=$SLUG
          EOF

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: macos-meta
          path: macos-meta.env
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

# ─────────────────────────────────────────────────────────────────────────────
# Job 6: Upload macOS installer to S3 via release API
# ─────────────────────────────────────────────────────────────────────────────
  upload-macos:
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: mofo-release-macos-${{ github.run_id }}

      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: pkg/

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: macos-meta
          path: .

      - name: Load build metadata
        run: sed 's/^ *//' macos-meta.env >> "$GITHUB_ENV"

      - name: Resolve pkg path
        run: |
          FILE=$(find pkg/ -maxdepth 1 -type f | head -n 1)
          echo "FILE_PATH=$FILE" >> "$GITHUB_ENV"

      - name: Install botocore
        run: pip3 install botocore --break-system-packages --quiet

      - name: Upload pkg to S3 and notify release API
        env:
          PLATFORM: macos
          CONTENT_TYPE: application/x-newton-compatible-pkg
        run: |
          if [ -z "$RELEASE_API" ]; then
            echo "Missing RELEASE_API_URL secret." >&2
            exit 1
          fi
          python3 << 'PYEOF'
          import json, mimetypes, os, urllib.error, urllib.request
          from urllib.parse import urlsplit
          import botocore.auth, botocore.awsrequest, botocore.credentials, botocore.session

          api_base     = os.environ["RELEASE_API"].rstrip("/")
          slug         = os.environ["SLUG"]
          version      = os.environ["VERSION"]
          platform     = os.environ["PLATFORM"]
          filename     = os.environ["PKG_NAME"]
          filepath     = os.environ["FILE_PATH"]
          content_type = os.environ.get("CONTENT_TYPE") or "application/octet-stream"
          sha256       = os.environ["FILE_SHA256"]
          aws_region   = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION") or "us-east-1"

          session      = botocore.session.get_session()
          creds        = session.get_credentials()
          if creds is None: raise RuntimeError("No AWS credentials available.")
          frozen_creds = creds.get_frozen_credentials()

          def signed_post_json(path, payload):
              url  = f"{api_base}/{path.lstrip('/')}"
              body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
              headers = {"Content-Type": "application/json", "Accept": "application/json", "Host": urlsplit(url).netloc}
              aws_req = botocore.awsrequest.AWSRequest(method="POST", url=url, data=body, headers=headers)
              botocore.auth.SigV4Auth(frozen_creds, "execute-api", aws_region).add_auth(aws_req)
              req = urllib.request.Request(url, data=body, method="POST", headers=dict(aws_req.headers.items()))
              try:
                  with urllib.request.urlopen(req, timeout=120) as r:
                      return json.loads(r.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  raise RuntimeError(f"{path} HTTP {exc.code}: {exc.read().decode('utf-8', errors='replace')[:2000]}") from exc

          def put_file(upload_url):
              size = os.path.getsize(filepath)
              with open(filepath, "rb") as f:
                  req = urllib.request.Request(upload_url, data=f, method="PUT",
                      headers={"Content-Type": content_type, "Content-Length": str(size)})
                  try:
                      with urllib.request.urlopen(req, timeout=1800) as r: r.read()
                  except urllib.error.HTTPError as exc:
                      raise RuntimeError(f"S3 PUT HTTP {exc.code}: {exc.read().decode('utf-8', errors='replace')[:2000]}") from exc
              return size

          presign = signed_post_json("api/release-upload/presign", {
              "slug": slug, "version": version, "platform": platform,
              "filename": filename, "contentType": content_type,
          })
          print("Presign:", json.dumps({"key": presign.get("key"), "publicUrl": presign.get("publicUrl")}, indent=2))
          missing = [k for k in ("uploadUrl", "key", "publicUrl") if k not in presign]
          if missing: raise RuntimeError(f"Presign missing: {missing}")
          size = put_file(presign["uploadUrl"])
          print(f"S3 upload complete: {size} bytes")
          confirm = signed_post_json("api/release-upload/confirm", {
              "slug": slug, "version": version, "platform": platform,
              "new_key": presign["key"], "new_url": presign["publicUrl"], "sha256": sha256,
          })
          print("Confirm:", json.dumps(confirm, indent=2))
          PYEOF

# ─────────────────────────────────────────────────────────────────────────────
# Job 7: Trigger site rebuild after both platforms upload successfully
# ─────────────────────────────────────────────────────────────────────────────
  rebuild-site:
    needs: [upload-windows, upload-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: mofo-release-rebuild-${{ github.run_id }}

      - name: Trigger Amplify rebuild via webhook
        run: |
          REBUILD_URL=$(aws ssm get-parameter \
            --name "/abc-dev/rebuild-url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          curl -sf -X POST "$REBUILD_URL"
          echo "Amplify rebuild triggered"